# ==========================================
# OpenAPI/Swagger UI Customization
# ==========================================
# This file controls all content displayed in the Swagger UI
# Edit this file to customize your API documentation

# ==========================================
# API Information
# ==========================================
# These values appear at the top of the Swagger UI page

# API Title (displayed in browser tab and header)
swagger.api.title=SCIM Gateway - REST API Documentation

# API Version (displayed next to title)
swagger.api.version=1.0.0

# API Description (main content - supports Markdown)
# Use \\n for new lines
swagger.api.description=##  SCIM 2.0 Gateway - Complete Identity Management Solution\n\nA production-ready SCIM (System for Cross-domain Identity Management) 2.0 compliant API for automated user provisioning and identity management across multiple applications.

# Terms of Service URL
swagger.api.terms-of-service=https://github.com/strangecodee/scim_gateway

