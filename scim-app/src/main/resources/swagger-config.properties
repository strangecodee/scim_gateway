# ==========================================
# Quick Start Examples
# ==========================================
# These code examples appear in the documentation

# Example 1: Get authentication token
swagger.examples.login.title=1. Get authentication token
swagger.examples.login.command=curl -X POST http://localhost:8080/auth/login \\\n  -H "Content-Type: application/json" \\\n  -d '{"username":"admin","password":"admin123"}'

# Example 2: Create a user
swagger.examples.create-user.title=2. Create a user
swagger.examples.create-user.command=curl -X POST http://localhost:8080/scim/v2/Users \\n  -H "Authorization: Bearer YOUR_TOKEN" \\n  -H "Content-Type: application/json" \\n  -d '{
    "userName": "john.doe@example.com",
    "name": {
      "givenName": "John",
      "familyName": "Doe"
    },
    "emails": [{"value": "john.doe@example.com"}],
    "active": true
  }'

# Example 3: List all users
swagger.examples.list-users.title=3. List all users
swagger.examples.list-users.command=curl http://localhost:8080/scim/v2/Users \\\n  -H "Authorization: Bearer YOUR_TOKEN"

# ==========================================
# Server Configuration
# ==========================================

# Base URL of your API
swagger.server.url=http://localhost:8080

# Server description
swagger.server.description=Local Development Server

# ==========================================
# UI Customization
# ==========================================

# Enable/disable "Try it out" button by default
swagger.ui.try-it-out-enabled=true

# Enable search/filter bar
swagger.ui.filter-enabled=true

# Sort operations by (method, alpha)
swagger.ui.operations-sorter=method

# Sort tags alphabetically
swagger.ui.tags-sorter=alpha

# Deep linking to specific operations
swagger.ui.deep-linking=true

# Display request duration
swagger.ui.display-request-duration=true

# Default models expansion depth (-1: hidden, 0: collapsed, 1+: expanded)
swagger.ui.default-models-expand-depth=-1

