# ==========================================
# Authentication Configuration
# ==========================================

# Security scheme name
swagger.security.scheme-name=bearerAuth

# Security scheme type (bearer, basic, apiKey)
swagger.security.scheme-type=bearer

# Token format (JWT, Bearer, etc.)
swagger.security.bearer-format=JWT

# Instructions shown in the Authorize popup
swagger.security.description=Enter your JWT Bearer token for authentication.

**How to get a token:**
1. Use the `/auth/login` endpoint with your credentials
2. Copy the token from the response
3. Paste it here (without 'Bearer ' prefix)
4. Click 'Authorize'

