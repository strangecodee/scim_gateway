# ==========================================
# Production Configuration - MongoDB Atlas
# ==========================================

# MongoDB Configuration
# CRITICAL: Use environment variable for security
# Set via: export MONGODB_URI="mongodb+srv://user:pass@cluster.mongodb.net/scimdb"
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://CHANGE_ME:CHANGE_ME@cluster.mongodb.net/scimdb?retryWrites=true&w=majority}

# Enable auto index creation
spring.data.mongodb.auto-index-creation=true

# Disable JPA/PostgreSQL (using MongoDB)
spring.main.allow-bean-definition-overriding=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ==========================================
# Production Security Settings
# ==========================================

# JWT Configuration
# Generate using: openssl rand -base64 32
# Set via: export JWT_SECRET="your-secret-here"
jwt.secret=${JWT_SECRET:CHANGE-THIS-IMMEDIATELY-IN-PRODUCTION}
jwt.expiration=86400000

# Authentication
# Set via: export SCIM_ADMIN_PASSWORD="your-strong-password"
auth.default.username=admin
auth.default.password=${SCIM_ADMIN_PASSWORD:CHANGE-THIS-IMMEDIATELY}
auth.enabled=true

# ==========================================
# Production Optimizations
# ==========================================

# Enable response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Request size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==========================================
# Logging for Production
# ==========================================
logging.level.root=INFO
logging.level.com.scim_gateway=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# Actuator (Health Checks)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.mongodb.enabled=true
management.health.diskspace.enabled=false
